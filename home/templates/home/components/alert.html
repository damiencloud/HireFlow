<!-- HireFlow Reusable Dismissible Alerts - App Modular Version -->

<!-- 1. Success Alert -->
<div class="alert alert-success alert-dismissible fade show rounded-4 border-0 shadow-sm p-3 mb-3 d-flex align-items-center gap-3" role="alert" style="background-color: rgba(16, 185, 129, 0.08) !important; color: var(--hf-success) !important; border-left: 4px solid var(--hf-success) !important;">
    <span class="fs-4 d-inline-flex"><i class="bi bi-check-circle-fill"></i></span>
    <div>
        <strong class="fw-bold">Success!</strong> Your job application has been submitted successfully.
    </div>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close" style="top: auto;"></button>
</div>

<!-- 2. Danger Alert -->
<div class="alert alert-danger alert-dismissible fade show rounded-4 border-0 shadow-sm p-3 mb-3 d-flex align-items-center gap-3" role="alert" style="background-color: rgba(244, 63, 94, 0.08) !important; color: var(--hf-danger) !important; border-left: 4px solid var(--hf-danger) !important;">
    <span class="fs-4 d-inline-flex"><i class="bi bi-exclamation-octagon-fill"></i></span>
    <div>
        <strong class="fw-bold">Error!</strong> The email address or password you entered is incorrect.
    </div>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close" style="top: auto;"></button>
</div>

<!-- 3. Warning Alert -->
<div class="alert alert-warning alert-dismissible fade show rounded-4 border-0 shadow-sm p-3 mb-3 d-flex align-items-center gap-3" role="alert" style="background-color: rgba(245, 158, 11, 0.08) !important; color: var(--hf-warning) !important; border-left: 4px solid var(--hf-warning) !important;">
    <span class="fs-4 d-inline-flex"><i class="bi bi-exclamation-triangle-fill"></i></span>
    <div>
        <strong class="fw-bold">Warning!</strong> Your profile setup is incomplete. Upload a resume to attract recruiters.
    </div>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close" style="top: auto;"></button>
</div>

<!-- 4. Info Alert -->
<div class="alert alert-info alert-dismissible fade show rounded-4 border-0 shadow-sm p-3 mb-3 d-flex align-items-center gap-3" role="alert" style="background-color: rgba(6, 182, 212, 0.08) !important; color: var(--hf-info) !important; border-left: 4px solid var(--hf-info) !important;">
    <span class="fs-4 d-inline-flex"><i class="bi bi-info-circle-fill"></i></span>
    <div>
        <strong class="fw-bold">Notice!</strong> You have 3 new job matches matching your search history.
    </div>
    <button type="button" class="btn-close shadow-none" data-bs-dismiss="alert" aria-label="Close" style="top: auto;"></button>
</div>

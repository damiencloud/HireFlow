{% extends "home/base.html" %}

{% block title %}Permission Denied - HireFlow{% endblock %}

{% block content %}
<main class="flex-grow-1 container d-flex align-items-center justify-content-center py-5">
    <div class="text-center bg-white p-5 rounded-4 shadow-sm border border-light max-width-form mx-auto" style="max-width: 550px;">
        <div class="display-1 fw-800 text-danger mb-3" style="color: #dc3545 !important;">403</div>
        <h2 class="fw-bold text-dark mb-3">Access Denied</h2>
        <p class="text-muted mb-4" style="line-height: 1.6;">
            You do not have authorization to view this page. Some sections are restricted based on user roles (Candidate vs. Recruiter).
        </p>
        <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
            <a href="javascript:history.back()" class="btn btn-secondary-custom fw-bold px-4 py-2 border" style="border-color: var(--hf-border-color) !important;">
                <i class="bi bi-arrow-left-short me-1" style="font-size: 1.1rem; font-weight: 800;"></i> Go Back
            </a>
            <a href="{% url 'dashboard' %}" class="btn btn-primary-custom fw-bold px-4 py-2 border-0">
                <i class="bi bi-speedometer2 me-1"></i> Go to Dashboard
            </a>
        </div>
    </div>
</main>
{% endblock %}

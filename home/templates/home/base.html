<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}HireFlow - Premium Job Portal connecting tech talents with startups and enterprises.{% endblock %}">
    
    <title>{% block title %}HireFlow - Modern Job Portal & Career Platform{% endblock %}</title>

    <!-- 1. Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- 2. Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- 3. HireFlow Global CSS (App Modular Version Path with Cache-Buster) -->
    <link rel="stylesheet" href="/home/static/home/css/global.css?v=2">

    <!-- Optional Page-Specific CSS Block -->
    {% block extra_css %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- A. Reusable Navbar Component (Server-Side Include) -->
    {% include "home/components/navbar.html" %}

    <!-- Django Messages Framework Alerts -->
    {% if messages %}
        <div class="container mt-3 mb-0">
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show border-0 shadow-sm" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <!-- B. Main Content Slots -->
    {% block content %}{% endblock %}


    <!-- C. Reusable Footer Component (Server-Side Include) -->
    {% include "home/components/footer.html" %}

    <!-- 4. Bootstrap Bundle with Popper JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- 5. HireFlow JavaScript Utilities -->
    <script src="/home/static/home/js/global.js?v=2"></script>
    <script src="/home/static/home/js/form-validation.js?v=2"></script>

    <!-- Optional Page-Specific JS Block -->
    {% block extra_js %}{% endblock %}
</body>
</html>
